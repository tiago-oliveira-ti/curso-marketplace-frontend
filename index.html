<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace de Cursos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Marketplace de Cursos</h1>
    <nav>
      <button data-filter="all" class="ativo">Todos</button>
      <button data-filter="programacao">Programação</button>
      <button data-filter="design">Design</button>
      <button data-filter="marketing">Marketing</button>
    </nav>
    <div class="actions">
      <button id="btn-darkmode">🌙</button>
      <button id="btn-carrinho">🛒 Carrinho (<span id="carrinho-count">0</span>)</button>
      <button id="btn-login">Login</button>
    </div>
  </header>

  <main id="cursos-container"></main>

  <!-- Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>

  <!-- Modal Carrinho -->
  <div id="carrinho-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Carrinho de compras">
    <h2>Seu Carrinho</h2>
    <ul id="carrinho-lista"></ul>
    <p>Total: <span id="carrinho-total">R$ 0,00</span></p>
    <button id="btn-fechar-carrinho">Fechar</button>
  </div>

  <!-- Modal Login -->
  <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Login">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <p id="login-erro" style="color: red; font-size: 0.85rem; min-height: 1.2rem;"></p>
    <button id="btn-entrar">Entrar</button>
    <button id="btn-fechar-login">Fechar</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <footer>
    <p>© 2026 - Marketplace de Cursos</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
